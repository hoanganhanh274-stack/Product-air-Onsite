    <!-- Script chính của ứng dụng React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        import { 
          LayoutDashboard, Package, Camera, CheckCircle, Clock, AlertCircle,
          Search, Filter, Download, TrendingUp, BarChart3, Calendar, Edit2, Save,
          XCircle, PlusCircle, Trash2, Minus, ChevronDown, ChevronUp, ArrowRight,

          UploadCloud, FileSpreadsheet, Loader2, PieChart, MapPin, Video
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- MOCK DATA ---
        const initialDatabaseData = [
          { stt: 1, sku: 'GNPF00W000004', lot: '', location: '', borrowStatus: 'Chưa mượn', receiveDate: '', month: '3', category: 'Hàng kênh 10', collection: 'New Arrival', photoStatus: 'Chưa chụp', retouchStatus: 'chưa retouch' },
          { stt: 2, sku: 'GMDDDDX000083', lot: 'Mã phiên', location: '', borrowStatus: 'Chưa mượn', receiveDate: '', month: '3', category: 'Hàng kênh 10', collection: 'New Arrival', photoStatus: 'Chưa chụp', retouchStatus: 'chưa retouch' },
          { stt: 3, sku: 'GCPTDDW000013', lot: '', location: '', borrowStatus: 'Chưa mượn', receiveDate: '', month: '3', category: 'Hàng 2024', collection: 'New Arrival', photoStatus: 'Chưa chụp', retouchStatus: 'chưa retouch' },
          { stt: 8, sku: 'GI0000Y060366', lot: '14m_KHO_1808.2025', location: 'KHO', borrowStatus: 'Chưa mượn', receiveDate: '', month: '4', category: 'Hàng 2025', collection: 'Trang sức 24K', photoStatus: 'Chưa chụp', retouchStatus: 'chưa retouch' },
          { stt: 3986, sku: 'GL0000W001676', lot: '103m_KHO_2403.2026', location: 'KHO', borrowStatus: 'Dự kiến mượn', receiveDate: '', month: '4', category: 'Hàng 2026', collection: 'Disney Evergreen', photoStatus: 'Chưa chụp', retouchStatus: 'chưa retouch' },
          { stt: 3987, sku: 'GL0000W001677', lot: '103m_KHO_2403.2026', location: 'KHO', borrowStatus: 'Dự kiến mượn', receiveDate: '', month: '4', category: 'Hàng 2026', collection: 'Disney Evergreen', photoStatus: 'Chưa chụp', retouchStatus: 'chưa retouch' },
          { stt: 3990, sku: 'GLXM00W000545', lot: '103m_KHO_2403.2026', location: 'KHO', borrowStatus: 'Dự kiến mượn', receiveDate: '', month: '4', category: 'Hàng 2026', collection: 'Disney Evergreen', photoStatus: 'Chưa chụp', retouchStatus: 'chưa retouch' },
        ];

        const initialKeyCollections = [
          { id: 1, name: 'New Arrival', target: 200, current: 45, status: 'Đang chạy' }, 
          { id: 2, name: 'Disney Evergreen', target: 150, current: 150, status: 'Hoàn thành' },
          { id: 3, name: 'Trang sức 24K', target: 350, current: 0, status: 'Dự kiến' },
        ];

        const initialBorrowingData = [
          { id: 'B01', lot: 'LM-001', status: 'Done', month: 1, location: 'KHO', type: 'Đã mượn', plan: '-', actual: 422, note: '', startDate: '01/01/2026', days: 30, receiveDate: '01/31/2026', returnDate: '-', color: 'text-gray-700', photographer: 'Minh', shootStatus: 'Đã xong', retoucher: 'Lan', retouchStatus: 'Đã xong' },
          { id: 'B02', lot: 'LM-002', status: 'Done', month: 2, location: 'KHO', type: 'Đã mượn', plan: '-', actual: 479, note: '', startDate: '02/01/2026', days: 27, receiveDate: '02/28/2026', returnDate: '-', color: 'text-gray-700', photographer: 'Tuấn', shootStatus: 'Đã xong', retoucher: 'Huy', retouchStatus: 'Đã xong' },
          { id: 'B03', lot: 'LM-003', status: 'Process', month: 3, location: 'KHO', type: 'Đã mượn', plan: 204, actual: 355, note: 'Kiểm kê, nghỉ tết', startDate: '01/22/2026', days: 40, receiveDate: '03/03/2026', returnDate: '03/16/2026', color: 'text-gray-700', photographer: 'Minh', shootStatus: 'Đang xử lý', retoucher: 'Lan', retouchStatus: 'Chưa bắt đầu' },
          { id: 'B05', lot: 'LM-005', status: 'Process', month: 3, location: 'Sang tay', type: 'Đã mượn', plan: 11, actual: 11, note: '', startDate: '03/03/2026', days: 2, receiveDate: '03/05/2026', returnDate: '-', color: 'text-gray-700', photographer: 'Tuấn', shootStatus: 'Đang set-up', retoucher: 'Huy', retouchStatus: 'Chờ duyệt' },
          { id: 'B06', lot: 'LM-006', status: 'Dự kiến', month: 3, location: 'NVT', type: 'Đã mượn', plan: 45, actual: 221, note: '', startDate: '03/03/2026', days: 2, receiveDate: '03/05/2026', returnDate: '-', color: 'text-gray-700', photographer: 'Minh', shootStatus: 'Chưa chụp', retoucher: '-', retouchStatus: 'Chưa bắt đầu' },
          { id: 'B11', lot: 'LM-011', status: 'Dự kiến', month: 3, location: 'KHO', type: 'Dự kiến mượn', plan: 143, actual: 202, note: '', startDate: '03/02/2026', days: 22, receiveDate: '03/24/2026', returnDate: '-', color: 'text-blue-600', photographer: '-', shootStatus: 'Chưa chụp', retoucher: '-', retouchStatus: 'Chưa bắt đầu' },
        ];

        const initialVideoData = [
          { id: 'V01', month: 1, lot: 'Video-Jan', actual: 44, shootStatus: 'Đã xong', editStatus: 'Đã xong', note: 'Hoàn thành tốt' },
          { id: 'V02', month: 2, lot: 'Video-Feb', actual: 34, shootStatus: 'Đã xong', editStatus: 'Đang dựng', note: 'Chờ duyệt file cuối' },
        ];

        // --- UTILS ---
        const getStatusColor = (status) => {
          if (!status) return 'bg-gray-100 text-gray-500 border-gray-200';
          const s = status.toLowerCase();
          if (s.includes('done') || s.includes('hoàn thành') || s.includes('đã xong') || s.includes('đã mượn') || s.includes('đã chụp') || s.includes('đã retouch')) return 'bg-[#CBA563]/20 text-[#7A5C22] border-[#CBA563]/40';
          if (s.includes('chưa') || s.includes('not yet') || s.includes('dự kiến')) return 'bg-gray-100 text-gray-600 border-gray-200';
          if (s.includes('cancel') || s.includes('quá hạn')) return 'bg-[#A91E22]/10 text-[#A91E22] border-[#A91E22]/30';
          return 'bg-[#1C3F60]/10 text-[#1C3F60] border-[#1C3F60]/30'; 
        };

        const calculateDaysDifference = (startStr, endStr) => {
          if (!startStr || startStr === '-' || !endStr || endStr === '-') return '-';
          const start = new Date(startStr); const end = new Date(endStr);
          if (isNaN(start.getTime()) || isNaN(end.getTime())) return '-';
          return Math.ceil((end - start) / (1000 * 60 * 60 * 24));
        };

        const diffDaysDates = (start, end) => {
          if (!start || !end || isNaN(start.getTime()) || isNaN(end.getTime())) return 0;
          const s = new Date(start.getFullYear(), start.getMonth(), start.getDate());
          const e = new Date(end.getFullYear(), end.getMonth(), end.getDate());
          return Math.round((e - s) / (1000 * 60 * 60 * 24));
        };

        const formatShortDate = (dateObj) => {
          if (!dateObj || isNaN(dateObj.getTime())) return '-';
          return `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
        };

        const computeBatches = (receiveDateStr, totalQty) => {
          const validQty = Number(totalQty) || 0;
          if (!receiveDateStr || receiveDateStr === '-' || validQty <= 0) return [];
          const receiveDate = new Date(receiveDateStr);
          if (isNaN(receiveDate.getTime())) return [];

          const batches = [];
          let remaining = validQty;
          
          let currentPhotoStart = new Date(receiveDate);
          currentPhotoStart.setDate(currentPhotoStart.getDate() + 1);

          let batchNum = 1;
          const maxPerBatch = 160;
          const photoRate = 32; 
          const retouchRate = 20; 

          while (remaining > 0) {
            const qty = Math.min(maxPerBatch, remaining);
            remaining -= qty;

            const photoDays = Math.ceil(qty / photoRate);
            const retouchDays = Math.ceil(qty / retouchRate);

            const pStart = new Date(currentPhotoStart);
            const pEnd = new Date(pStart);
            pEnd.setDate(pEnd.getDate() + Math.max(1, photoDays) - 1); 

            const rStart = new Date(pEnd);
            rStart.setDate(rStart.getDate() + 1); 
            
            const rEnd = new Date(rStart);
            rEnd.setDate(rEnd.getDate() + Math.max(1, retouchDays) - 1);

            const totalDays = Math.ceil((rEnd - pStart) / (1000 * 60 * 60 * 24)) + 1;

            batches.push({
              name: `GÓI ${batchNum}`, qty, photoStart: pStart, photoEnd: pEnd, photoDays, retouchStart: rStart, retouchEnd: rEnd, retouchDays, totalDays: totalDays
            });

            currentPhotoStart = new Date(pEnd);
            currentPhotoStart.setDate(currentPhotoStart.getDate() + 1);
            batchNum++;
          }
          return batches;
        };

        const ProgressBar = ({ label, value, max, colorClass }) => {
          const percentage = max > 0 ? Math.round((value / max) * 100) : 0;
          return (
            <div className="mb-5">
              <div className="flex justify-between items-end mb-1.5">
                <span className="text-sm font-bold text-[#1C3F60]">{label}</span>
                <span className="text-sm font-medium text-gray-600">{value.toLocaleString()} / {max.toLocaleString()} <span className="font-bold text-[#A91E22]">({percentage}%)</span></span>
              </div>
              <div className="w-full bg-[#EBE1CD] rounded-full h-2.5 overflow-hidden shadow-inner">
                <div className={`h-2.5 rounded-full ${colorClass} transition-all duration-1000`} style={{ width: `${percentage}%` }}></div>
              </div>
            </div>
          );
        };

        // --- MAIN APP COMPONENT ---
        function App() {
          const [activeTab, setActiveTab] = useState('overview'); 
          
          // States cho Database Tab (Isolated)
          const [dbData, setDbData] = useState(initialDatabaseData);
          const [dbSearchQuery, setDbSearchQuery] = useState('');
          const [dbSelectedMonths, setDbSelectedMonths] = useState([]);
          const [dbSelectedLocations, setDbSelectedLocations] = useState([]);
          const [monthDropdownOpen, setMonthDropdownOpen] = useState(false);
          const [locationDropdownOpen, setLocationDropdownOpen] = useState(false);
          const [isImporting, setIsImporting] = useState(false);
          const [showMissingPhoto, setShowMissingPhoto] = useState(false);
          const [showMissingRetouch, setShowMissingRetouch] = useState(false);
          const fileInputRef = useRef(null);
          const [dbPage, setDbPage] = useState(1);
          const dbItemsPerPage = 100;

          // States Collections
          const [collections, setCollections] = useState(initialKeyCollections);
          const [editingColId, setEditingColId] = useState(null);
          const [editColData, setEditColData] = useState({});

          // States Borrowing & Production
          const [borrowData, setBorrowData] = useState(initialBorrowingData);
          const [editingId, setEditingId] = useState(null);
          const [editFormData, setEditFormData] = useState({});
          const [isAddingNew, setIsAddingNew] = useState(false);

          const [editingProdId, setEditingProdId] = useState(null);
          const [editProdFormData, setEditProdFormData] = useState({});
          
          const [searchQuery, setSearchQuery] = useState('');
          const [showPivotTable, setShowPivotTable] = useState(true);
          const [selectedPivotMonths, setSelectedPivotMonths] = useState([]);

          const [hideCompletedBorrow, setHideCompletedBorrow] = useState(true);
          const [hideCompletedProd, setHideCompletedProd] = useState(true);

          // States for Video Production
          const [videoData, setVideoData] = useState(initialVideoData);
          const [editingVideoId, setEditingVideoId] = useState(null);
          const [editVideoFormData, setEditVideoFormData] = useState({});
          const [isAddingNewVideo, setIsAddingNewVideo] = useState(false);

          // Get available filters dynamically from DB Data
          const availableDbMonths = useMemo(() => {
            return [...new Set(dbData.map(r => r.month))]
              .filter(m => m !== undefined && m !== null && String(m).trim() !== '')
              .sort((a, b) => Number(a) - Number(b));
          }, [dbData]);

          const availableDbLocations = useMemo(() => {
            return [...new Set(dbData.map(r => r.location))]
              .filter(l => l !== undefined && l !== null && String(l).trim() !== '')
              .sort((a, b) => String(a).localeCompare(String(b)));
          }, [dbData]);

          // Data Filtering & Pagination cho Database Tab
          const filteredDbData = useMemo(() => {
            return dbData.filter(row => {
              const matchSearch = Object.values(row).some(val => String(val).toLowerCase().includes(dbSearchQuery.toLowerCase()));
              const matchMonth = dbSelectedMonths.length === 0 || dbSelectedMonths.includes(String(row.month));
              const matchLocation = dbSelectedLocations.length === 0 || dbSelectedLocations.includes(String(row.location));
              return matchSearch && matchMonth && matchLocation;
            });
          }, [dbData, dbSearchQuery, dbSelectedMonths, dbSelectedLocations]);

          const totalDbPages = Math.ceil(filteredDbData.length / dbItemsPerPage) || 1;
          const validDbPage = Math.min(dbPage, totalDbPages);
          const paginatedDbData = filteredDbData.slice((validDbPage - 1) * dbItemsPerPage, validDbPage * dbItemsPerPage);

          // CSV Import Handler
          const handleImportCSV = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setIsImporting(true);
            const reader = new FileReader();
            reader.onload = (evt) => {
              const text = evt.target.result;
              const lines = text.split(/\r?\n/);
              const parsedData = [];

              for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                let arr = [];
                let quote = false;
                let val = '';
                for (let j = 0; j < line.length; j++) {
                    let cc = line[j], nc = line[j+1];
                    if (cc === '"' && quote && nc === '"') { val += '"'; j++; continue; }
                    if (cc === '"') { quote = !quote; continue; }
                    if (cc === ',' && !quote) { arr.push(val.trim()); val = ''; continue; }
                    val += cc;
                }
                arr.push(val.trim());

                parsedData.push({
                  stt: arr[0] || i,
                  sku: arr[1] || '',
                  lot: arr[2] || '',
                  location: arr[3] || '',
                  borrowStatus: arr[4] || '',
                  receiveDate: arr[5] || '',
                  month: arr[6] || '',
                  category: arr[7] || '',
                  collection: arr[8] || '',
                  photoStatus: arr[9] || '',
                  retouchStatus: arr[10] || ''
                });
              }
              
              setDbData(parsedData);
              setDbPage(1); 
              setDbSelectedMonths([]);
              setDbSelectedLocations([]);
              setIsImporting(false);
              e.target.value = null; 
            };
            reader.readAsText(file);
          };

          // Metrics Calculations
          const kpi2026 = 6692;
          const metrics = useMemo(() => {
            let totalDone = 0; let totalExpected = 0;
            let totalReceived = 0; let totalShot = 0; let totalRetouched = 0;
            const monthlyData = {}; const pivot = {}; let grandTotal = 0;

            borrowData.forEach(row => {
              const val = Number(row.actual) || 0;

              if (row.type === 'Đã mượn') {
                totalDone += val;
                const m = row.month;
                if (!monthlyData[m]) monthlyData[m] = 0;
                monthlyData[m] += val;
              }
              if (row.type === 'Dự kiến mượn') totalExpected += val;

              if (selectedPivotMonths.length === 0 || selectedPivotMonths.includes(Number(row.month))) {
                const type = row.type; const loc = row.location;
                if (!pivot[type]) pivot[type] = {};
                if (!pivot[type][loc]) pivot[type][loc] = 0;
                pivot[type][loc] += val;
                grandTotal += val;
              }

              if (row.receiveDate && row.receiveDate !== '-' && row.type === 'Đã mượn') {
                totalReceived += val;
                if (row.shootStatus === 'Đã xong') totalShot += val;
                if (row.retouchStatus === 'Đã xong') totalRetouched += val;
              }
            });

            const percentDone = ((totalDone / kpi2026) * 100).toFixed(2);
            const chartData = Object.entries(monthlyData).map(([m, val]) => ({ month: Number(m), val })).sort((a, b) => a.month - b.month);
            const groupedPivot = Object.entries(pivot).map(([type, locsObj]) => {
              const locs = Object.entries(locsObj).map(([loc, val]) => ({ loc, val }));
              const typeTotal = locs.reduce((sum, l) => sum + l.val, 0);
              return { type, locs, typeTotal };
            });
            groupedPivot.sort((a, b) => b.type.localeCompare(a.type));

            return { 
              totalDone, totalExpected, percentDone, chartData, groupedPivot, grandTotal, 
              prod: { totalReceived, totalShot, totalRetouched } 
            };
          }, [borrowData, selectedPivotMonths]);

          const filteredBorrowData = borrowData.filter(row => {
            const matchSearch = Object.values(row).some(val => String(val).toLowerCase().includes(searchQuery.toLowerCase()));
            return matchSearch;
          });

          // Handlers for Borrowing
          const handleAddRow = () => {
            const newId = 'B' + Date.now();
            const newRow = {
              id: newId, lot: `LM-${String(borrowData.length + 1).padStart(3, '0')}`, status: 'Process', month: new Date().getMonth() + 1, location: 'KHO', type: 'Đã mượn', plan: 0, actual: 0, note: '', startDate: '', days: '-', receiveDate: '', returnDate: '', color: 'text-gray-700',
              photographer: '-', shootStatus: 'Chưa chụp', retoucher: '-', retouchStatus: 'Chưa bắt đầu'
            };
            setBorrowData([newRow, ...borrowData]);
            setEditingId(newId); setEditFormData(newRow); setIsAddingNew(true);
          };

          const handleEditClick = (row) => {
            setEditingId(row.id);
            setEditFormData({ ...row });
            setIsAddingNew(false);
          };

          const handleEditFormChange = (e, field) => {
            const newValue = e.target.value;
            const updatedForm = { ...editFormData, [field]: newValue };
            if (field === 'startDate' || field === 'receiveDate') {
              updatedForm.days = calculateDaysDifference(updatedForm.startDate, updatedForm.receiveDate);
            }
            setEditFormData(updatedForm);
          };

          const handleCancelEdit = () => {
            if (isAddingNew) setBorrowData(borrowData.filter(r => r.id !== editingId));
            setEditingId(null);
            setIsAddingNew(false);
          };

          const handleSaveClick = () => {
            setBorrowData(borrowData.map(row => row.id === editingId ? { ...editFormData, actual: Number(editFormData.actual) || 0 } : row));
            setEditingId(null);
            setIsAddingNew(false);
          };

          const handleDeleteRow = (id) => {
            setBorrowData(borrowData.filter(r => r.id !== id));
          };

          // Handlers for Collections
          const handleAddCol = () => {
            const newCol = { id: Date.now(), name: 'Tên BST Mới', target: 100, current: 0, status: 'Dự kiến' };
            setCollections([newCol, ...collections]);
            setEditingColId(newCol.id);
            setEditColData(newCol);
          };

          const handleEditColClick = (col) => {
            setEditingColId(col.id);
            setEditColData({ ...col });
          };

          const handleSaveColClick = () => {
            setCollections(collections.map(c => c.id === editingColId ? { ...editColData, target: Number(editColData.target) || 0, current: Number(editColData.current) || 0 } : c));
            setEditingColId(null);
          };

          const handleCancelColEdit = () => {
            if (editColData.name === 'Tên BST Mới' && editColData.target === 100 && editColData.current === 0) {
               setCollections(collections.filter(c => c.id !== editingColId));
            }
            setEditingColId(null);
          };

          const handleDeleteCol = (id) => {
            setCollections(collections.filter(c => c.id !== id));
          };

          const handleColChange = (e, field) => {
            setEditColData({ ...editColData, [field]: e.target.value });
          };

          // Handlers for Video Production
          const handleAddVideoRow = () => {
            const newId = 'V' + Date.now();
            const newRow = {
              id: newId, month: new Date().getMonth() + 1, lot: `Video-Mới`, actual: 0, shootStatus: 'Chưa quay', editStatus: 'Chưa dựng', note: ''
            };
            setVideoData([newRow, ...videoData]);
            setEditingVideoId(newId);
            setEditVideoFormData(newRow);
            setIsAddingNewVideo(true);
          };

          const handleEditVideoClick = (row) => {
            setEditingVideoId(row.id);
            setEditVideoFormData({ ...row });
            setIsAddingNewVideo(false);
          };

          const handleEditVideoFormChange = (e, field) => {
            setEditVideoFormData({ ...editVideoFormData, [field]: e.target.value });
          };

          const handleCancelVideoEdit = () => {
            if (isAddingNewVideo) {
              setVideoData(videoData.filter(r => r.id !== editingVideoId));
            }
            setEditingVideoId(null);
            setIsAddingNewVideo(false);
          };

          const handleSaveVideoClick = () => {
            setVideoData(videoData.map(row => row.id === editingVideoId ? { ...editVideoFormData, actual: Number(editVideoFormData.actual) || 0 } : row));
            setEditingVideoId(null);
            setIsAddingNewVideo(false);
          };

          const handleDeleteVideoRow = (id) => {
            setVideoData(videoData.filter(r => r.id !== id));
          };

          // ======================================================================
          // RENDER COMPONENTS
          // ======================================================================

          const renderDatabase = () => {
            const totalDb = filteredDbData.length;
            let borrowDoneCount = 0; let borrowNotCount = 0; let borrowExpCount = 0;
            let photoDoneCount = 0; let photoNotCount = 0;
            let retouchDoneCount = 0; let retouchNotCount = 0;

            const missingPhotoLotsMap = {};
            const missingRetouchLotsMap = {};

            filteredDbData.forEach(row => {
              const bStatus = (row.borrowStatus || '').toLowerCase();
              const pStatus = (row.photoStatus || '').toLowerCase();
              const rStatus = (row.retouchStatus || '').toLowerCase();
              const lotName = (row.lot && row.lot.trim() !== '') ? row.lot : '(Không rõ Lô)';

              let isBorrowed = false;

              if (bStatus.includes('đã') || bStatus.includes('done')) {
                borrowDoneCount++;
                isBorrowed = true;
              } else if (bStatus.includes('dự kiến')) {
                borrowExpCount++;
              } else {
                borrowNotCount++; 
              }

              if (isBorrowed) {
                if (pStatus.includes('đã') || pStatus.includes('done') || pStatus.includes('xong')) {
                  photoDoneCount++;
                } else {
                  photoNotCount++;
                  missingPhotoLotsMap[lotName] = (missingPhotoLotsMap[lotName] || 0) + 1;
                }

                if (rStatus.includes('đã') || rStatus.includes('done') || rStatus.includes('xong')) {
                  retouchDoneCount++;
                } else {
                  retouchNotCount++;
                  missingRetouchLotsMap[lotName] = (missingRetouchLotsMap[lotName] || 0) + 1;
                }
              }
            });

            const kpiQuarter = 120;
            
            const totalShot = videoData.reduce((acc, r) => acc + (Number(r.actual) || 0), 0);
            const percentQuarter = Math.round((totalShot / kpiQuarter) * 100);
            const percentYear = Math.round((totalShot / kpiYear) * 100);

            const vMonthly = {};
            videoData.forEach(r => {
              vMonthly[r.month] = (vMonthly[r.month] || 0) + (Number(r.actual) || 0);
            });
            const vChartData = Object.entries(vMonthly).map(([m, val]) => ({ month: Number(m), val })).sort((a, b) => a.month - b.month);
            const maxChartVal = Math.max(...vChartData.map(d => d.val), 50) * 1.2; 
            const chartColors = ['#8fa8c1', '#5e82a6', '#2d5c8a', '#1C3F60', '#11263c'];

            return (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2 duration-500">
                <div className="w-full bg-white rounded-xl shadow-sm border border-[#CBA563]/50 overflow-hidden flex flex-col md:flex-row">
                  <div className="bg-gradient-to-br from-[#1C3F60] to-[#2A5C8C] p-6 text-white md:w-1/3 flex flex-col justify-center relative overflow-hidden">
                    <div className="absolute -right-4 -bottom-4 opacity-10"><Video size={100} /></div>
                    <div className="relative z-10">
                      <p className="text-[#CBA563] text-sm font-bold uppercase tracking-wider mb-1">Mục tiêu Năm 2026</p>
                      <h2 className="text-4xl font-bold flex items-baseline gap-2">{kpiYear.toLocaleString()} <span className="text-lg font-medium text-white/70">sku</span></h2>
                      <div className="w-full bg-white/20 rounded-full h-1.5 mt-3"><div className="bg-[#CBA563] h-1.5 rounded-full" style={{width: `${Math.min(percentYear, 100)}%`}}></div></div>
                      <p className="text-xs text-white/80 mt-1.5">Đã đạt {percentYear}% kế hoạch năm</p>
                    </div>
                  </div>
                  
                  <div className="flex-1 grid grid-cols-2 divide-x divide-gray-100">
                    <div className="p-6 flex flex-col items-center justify-center hover:bg-gray-50 transition-colors relative">
                      <p className="text-gray-500 text-xs sm:text-sm font-bold uppercase tracking-wider mb-2 flex items-center gap-2"><CheckCircle size={18} className="text-[#108A68]" /> KPI Quý</p>
                      <span className="text-3xl sm:text-4xl font-light text-[#1C3F60]">{kpiQuarter.toLocaleString()}</span>
                    </div>
                    
                    <div className="p-6 flex flex-col items-center justify-center hover:bg-gray-50 transition-colors">
                      <p className="text-gray-500 text-xs sm:text-sm font-bold uppercase tracking-wider mb-2 flex items-center gap-2"><Video size={18} className="text-[#A6823F]" /> Tổng Đã Quay</p>
                      <div className="flex items-baseline gap-2 sm:gap-3">
                        <span className="text-3xl sm:text-4xl font-light text-[#A6823F]">{totalShot.toLocaleString()}</span>
                        <span className="text-sm sm:text-lg font-bold text-[#A6823F] bg-[#FDF4E3] px-2 py-1 rounded-md" title="% hoàn thành Quý">{percentQuarter}% Quý</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                  <div className="lg:col-span-1 bg-white rounded-xl border border-[#CBA563]/50 p-6 shadow-sm flex flex-col h-full">
                    <h3 className="text-lg font-bold text-[#1C3F60] mb-8 flex items-center gap-2"><BarChart3 size={20} className="text-[#CBA563]" /> Đã quay theo Tháng</h3>
                    <div className="h-[200px] relative flex items-end justify-around pb-6 pt-10 px-4 mt-2">
                       <div className="absolute inset-0 flex flex-col justify-between pb-6 text-xs text-gray-400 pointer-events-none z-0">
                         {[100, 75, 50, 25, 0].map(percent => {
                            const tickVal = Math.round((maxChartVal * percent) / 100);
                            return (
                              <div key={percent} className="w-full border-b border-gray-100 flex items-end relative h-0">
                                 <span className="absolute -left-2 bottom-0 translate-y-1/2 bg-white pr-2 text-gray-400 font-medium">{tickVal}</span>
                              </div>
                            )
                         })}
                       </div>
                       {vChartData.map((d, i) => {
                         const h = (d.val / maxChartVal) * 100;
                         return (
                           <div key={i} className="relative z-10 w-16 md:w-20 group flex flex-col items-center justify-end h-full mt-4">
                             <div className="absolute -top-10 bg-[#1C3F60] text-white text-xs px-2.5 py-1.5 rounded shadow-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-20 pointer-events-none">
                               {d.val} SKU<div className="absolute bottom-[-4px] left-1/2 -translate-x-1/2 w-2 h-2 bg-[#1C3F60] rotate-45"></div>
                             </div>
                             <span className="text-[#1C3F60] font-bold mb-2 text-sm z-20 absolute -top-6 transition-transform group-hover:-translate-y-2">{d.val}</span>
                             <div className="w-full rounded-t-md transition-all duration-500 hover:opacity-85 relative shadow-sm cursor-pointer" style={{ height: `${h}%`, backgroundColor: chartColors[i % chartColors.length] }}>
                               <div className="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent rounded-t-md pointer-events-none"></div>
                             </div>
                             <span className="absolute -bottom-7 text-sm font-bold text-gray-600">Tháng {d.month}</span>
                           </div>
                         )
                       })}
                    </div>
                  </div>

                  <div className="lg:col-span-2 bg-white rounded-xl border border-[#CBA563]/50 shadow-sm overflow-hidden flex flex-col h-full">
                    <div className="bg-[#1C3F60] px-6 py-4 flex items-center justify-between">
                       <h3 className="text-white font-bold text-sm uppercase tracking-wider flex items-center gap-2"><Video size={18} className="text-[#CBA563]" /> Bảng theo dõi Sản xuất Video</h3>
                       <button onClick={handleAddVideoRow} className="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 text-white rounded-md text-xs font-bold hover:bg-white/20 transition-colors cursor-pointer shadow-sm"><PlusCircle size={14} /> Thêm Lô Video</button>
                    </div>
                    
                    <div className="overflow-x-auto flex-1">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-[#EBE1CD] border-b border-[#CBA563]/50 text-[12px] uppercase tracking-wider text-[#1C3F60]">
                            <th className="px-4 py-4 font-bold whitespace-nowrap text-center">Tháng</th>
                            <th className="px-4 py-4 font-bold whitespace-nowrap">Lô Video</th>
                            <th className="px-4 py-4 font-bold whitespace-nowrap text-center">SL Thực Tế</th>
                            <th className="px-4 py-4 font-bold whitespace-nowrap">Tình trạng Quay</th>
                            <th className="px-4 py-4 font-bold whitespace-nowrap">Tình trạng Dựng</th>
                            <th className="px-4 py-4 font-bold whitespace-nowrap">Ghi chú</th>
                            <th className="px-4 py-4 font-bold whitespace-nowrap text-right">Hành động</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-[#CBA563]/20">
                          {videoData.map((row) => {
                            const isEditing = editingVideoId === row.id;
                            if (isEditing) {
                              return (
                                <tr key={row.id} className="bg-[#FDF4E3] text-[13px] border-b-2 border-[#CBA563] shadow-inner">
                                  <td className="px-2 py-2"><input type="number" value={editVideoFormData.month} onChange={(e) => handleEditVideoFormChange(e, 'month')} className="w-full p-1 border border-[#CBA563]/50 rounded text-xs text-center bg-white w-12 focus:outline-[#1C3F60] mx-auto" /></td>
                                  <td className="px-2 py-2"><input type="text" value={editVideoFormData.lot} onChange={(e) => handleEditVideoFormChange(e, 'lot')} className="w-full p-1 border border-[#CBA563]/50 rounded text-xs bg-white min-w-[100px] focus:outline-[#1C3F60]" /></td>
                                  <td className="px-2 py-2"><input type="number" value={editVideoFormData.actual} onChange={(e) => handleEditVideoFormChange(e, 'actual')} className="w-full p-1 border border-[#A91E22]/50 rounded text-xs text-center font-bold text-[#A91E22] bg-white w-16 mx-auto" /></td>
                                  <td className="px-2 py-2"><select value={editVideoFormData.shootStatus} onChange={(e) => handleEditVideoFormChange(e, 'shootStatus')} className="w-full p-1 border border-[#CBA563]/50 rounded text-xs bg-white focus:outline-[#1C3F60]"><option value="Chưa quay">Chưa quay</option><option value="Đang quay">Đang quay</option><option value="Đã xong">Đã xong</option></select></td>
                                  <td className="px-2 py-2"><select value={editVideoFormData.editStatus} onChange={(e) => handleEditVideoFormChange(e, 'editStatus')} className="w-full p-1 border border-[#CBA563]/50 rounded text-xs bg-white focus:outline-[#1C3F60]"><option value="Chưa dựng">Chưa dựng</option><option value="Đang dựng">Đang dựng</option><option value="Chờ duyệt">Chờ duyệt</option><option value="Đã xong">Đã xong</option></select></td>
                                  <td className="px-2 py-2"><input type="text" value={editVideoFormData.note || ''} onChange={(e) => handleEditVideoFormChange(e, 'note')} placeholder="Ghi chú..." className="w-full p-1 border border-[#CBA563]/50 rounded text-xs bg-white min-w-[100px]" /></td>
                                  <td className="px-2 py-2 whitespace-nowrap flex gap-1 justify-end"><button onClick={handleSaveVideoClick} className="p-1.5 bg-[#4CAF50] text-white rounded hover:bg-[#45a049] transition cursor-pointer" title="Lưu"><Save size={14} /></button><button onClick={handleCancelVideoEdit} className="p-1.5 bg-gray-500 text-white rounded hover:bg-gray-600 transition cursor-pointer" title="Hủy"><XCircle size={14} /></button></td>
                                </tr>
                              );
                            }
                            return (
                              <tr key={row.id} className="hover:bg-gray-50 transition-colors text-[13px] bg-white group">
                                <td className="px-4 py-3.5 text-center font-medium text-gray-600"><span className="bg-gray-50 text-gray-600 px-2.5 py-1 rounded text-xs border border-gray-200 shadow-sm">T{row.month}</span></td>
                                <td className="px-4 py-3.5 whitespace-nowrap font-bold text-[#1C3F60]">{row.lot}</td>
                                <td className="px-4 py-3.5 text-center"><span className="inline-flex items-center justify-center min-w-[36px] px-2 py-1 rounded-md bg-[#FDF4E3] border border-[#CBA563]/40 font-bold text-[#A91E22] shadow-sm">{row.actual}</span></td>
                                <td className="px-4 py-3.5 whitespace-nowrap"><span className={`px-2.5 py-1 rounded-md text-[11px] font-bold border inline-block text-center shadow-sm ${row.shootStatus === 'Đã xong' ? 'bg-[#CBA563]/20 text-[#7A5C22] border-[#CBA563]/40' : 'bg-gray-100 text-gray-600 border-gray-200'}`}>{row.shootStatus}</span></td>
                                <td className="px-4 py-3.5 whitespace-nowrap"><span className={`px-2.5 py-1 rounded-md text-[11px] font-bold border inline-block text-center shadow-sm ${row.editStatus === 'Đã xong' ? 'bg-[#CBA563]/20 text-[#7A5C22] border-[#CBA563]/40' : row.editStatus.includes('dựng') ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-gray-100 text-gray-600 border-gray-200'}`}>{row.editStatus}</span></td>
                                <td className="px-4 py-3.5 text-gray-600 text-xs max-w-[150px] truncate" title={row.note}>{row.note || '-'}</td>
                                <td className="px-4 py-3.5 whitespace-nowrap flex items-center justify-end gap-1.5 opacity-60 group-hover:opacity-100 transition-opacity"><button onClick={() => handleEditVideoClick(row)} className="p-1.5 bg-gray-100 text-gray-600 rounded hover:bg-gray-200 hover:text-[#1C3F60] transition cursor-pointer" title="Sửa"><Edit2 size={14} /></button><button onClick={() => handleDeleteVideoRow(row.id)} className="p-1.5 bg-gray-100 text-gray-600 rounded hover:bg-red-100 hover:text-red-600 transition cursor-pointer" title="Xóa"><Trash2 size={14} /></button></td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-[#FDF4E3] font-sans">
              <header className="bg-[#A91E22] border-b border-[#82171a] sticky top-0 z-10 shadow-md">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex items-center justify-between h-16">
                    <div className="flex items-center">
                      <div className="bg-white p-2 rounded-lg mr-3 shadow-sm">
                        <Package className="text-[#A91E22]" size={20} />
                      </div>
                      <h1 className="text-xl font-bold text-white uppercase tracking-wide">Quản Lý Sản Xuất Hình Ảnh</h1>
                    </div>
                    
                    {/* Logo PNJ góc phải */}
                    <div className="flex items-center">
                      <img 
                        src="logoPNJ_TRANG.png" 
                        alt="PNJ Logo" 
                        className="h-10 object-contain"
                        onError={(e) => { 
                          e.target.onerror = null; 
                          e.target.src = 'https://cdn.pnj.io/images/logo/pnj.com.vn.png'; 
                        }} 
                      />
                    </div>
                  </div>
                </div>
              </header>
              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative">
                <div className="flex flex-wrap gap-1 bg-[#F0E5D1] p-1.5 rounded-xl mb-8 w-fit border border-[#CBA563]/40 shadow-inner">
                  <button onClick={() => setActiveTab('overview')} className={`flex items-center px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'overview' ? 'bg-[#1C3F60] text-white shadow-md' : 'text-[#1C3F60] hover:bg-white/50 cursor-pointer'}`}>
                    <LayoutDashboard size={18} className="mr-2" /> Tổng quan
                  </button>
                  <button onClick={() => setActiveTab('borrowing')} className={`flex items-center px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'borrowing' ? 'bg-[#1C3F60] text-white shadow-md' : 'text-[#1C3F60] hover:bg-white/50 cursor-pointer'}`}>
                    <Package size={18} className="mr-2" /> Mượn hàng
                  </button>
                  <button onClick={() => setActiveTab('production')} className={`flex items-center px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'production' ? 'bg-[#1C3F60] text-white shadow-md' : 'text-[#1C3F60] hover:bg-white/50 cursor-pointer'}`}>
                    <Camera size={18} className="mr-2" /> Hình ảnh
                  </button>
                  <button onClick={() => setActiveTab('video')} className={`flex items-center px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'video' ? 'bg-[#1C3F60] text-white shadow-md' : 'text-[#1C3F60] hover:bg-white/50 cursor-pointer'}`}>
                    <Video size={18} className="mr-2" /> Sản xuất Video
                  </button>
                  <button onClick={() => setActiveTab('database')} className={`flex items-center px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'database' ? 'bg-[#1C3F60] text-white shadow-md' : 'text-[#1C3F60] hover:bg-white/50 cursor-pointer'}`}>
                    <Database size={18} className="mr-2" /> Database Thô
                  </button>
                </div>

                <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                  {activeTab === 'overview' && renderOverview()}
                  {activeTab === 'borrowing' && renderBorrowing()}
                  {activeTab === 'production' && renderProduction()}
                  {activeTab === 'video' && renderVideoProduction()}
                  {activeTab === 'database' && renderDatabase()}
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
