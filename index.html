<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNJ - Quản Lý Sản Phẩm</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (để biên dịch JSX trong trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-gray-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('database');

            // ================= STATE CHO DATABASE =================
            const [dbData, setDbData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedMonths, setSelectedMonths] = useState([]);
            const [selectedLocations, setSelectedLocations] = useState([]);
            
            const [showUnshotDetails, setShowUnshotDetails] = useState(false);
            const [showUnretouchedDetails, setShowUnretouchedDetails] = useState(false);
            
            const [isMonthDropdownOpen, setIsMonthDropdownOpen] = useState(false);
            const [isLocDropdownOpen, setIsLocDropdownOpen] = useState(false);

            // ================= STATE CHO VIDEO =================
            const [videoData, setVideoData] = useState([
                { id: 1, month: 'Tháng 1', shot: 44 },
                { id: 2, month: 'Tháng 2', shot: 34 }
            ]);
            const [newVideoRecord, setNewVideoRecord] = useState({ month: '', shot: '' });

            const kpiNăm = 480;
            const kpiQuý = 120;
            const totalVideoShot = videoData.reduce((acc, curr) => acc + Number(curr.shot), 0);

            // Xử lý Import CSV
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const text = event.target.result;
                        const rows = text.split('\n');
                        const headers = rows[0].split(',').map(h => h.trim());
                        
                        const parsedData = rows.slice(1).map(row => {
                            const values = row.split(',');
                            let obj = {};
                            headers.forEach((header, index) => {
                                obj[header] = values[index] ? values[index].trim() : '';
                            });
                            return obj;
                        }).filter(row => row['Mã SKU 17']); 
                        
                        setDbData(parsedData);
                    };
                    reader.readAsText(file);
                }
            };

            // Logic Lọc Database
            const filteredDbData = useMemo(() => {
                return dbData.filter(item => {
                    const matchSearch = (item['Mã SKU 17'] || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
                                        (item['Lô mượn'] || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                                        (item['Phân loại'] || '').toLowerCase().includes(searchTerm.toLowerCase());
                    
                    const itemMonth = item['Tháng'] || 'N/A';
                    const matchMonth = selectedMonths.length === 0 || selectedMonths.includes(itemMonth);
                    
                    const itemLoc = item['Nơi mượn'] || 'N/A';
                    const matchLoc = selectedLocations.length === 0 || selectedLocations.includes(itemLoc);

                    return matchSearch && matchMonth && matchLoc;
                });
            }, [dbData, searchTerm, selectedMonths, selectedLocations]);

            // Logic Thống kê Database
            const stats = useMemo(() => {
                const total = filteredDbData.length;
                
                const borrowed = filteredDbData.filter(i => i['Tình trạng mượn']?.toLowerCase().includes('done mượn')).length;
                const expected = filteredDbData.filter(i => i['Tình trạng mượn']?.toLowerCase().includes('dự kiến')).length;
                const unborrowed = total - borrowed - expected;

                const borrowedItems = filteredDbData.filter(i => i['Tình trạng mượn']?.toLowerCase().includes('done mượn'));
                
                const shot = borrowedItems.filter(i => i['Tình trạng chụp']?.toLowerCase().includes('đã chụp')).length;
                const unshot = borrowed - shot;
                
                const retouched = borrowedItems.filter(i => i['Tình trạng retouch']?.toLowerCase().includes('đã retouch')).length;
                const unretouched = borrowed - retouched;

                const unshotBatches = [...new Set(borrowedItems.filter(i => !i['Tình trạng chụp']?.toLowerCase().includes('đã chụp')).map(i => i['Lô mượn']).filter(Boolean))];
                const unretouchedBatches = [...new Set(borrowedItems.filter(i => !i['Tình trạng retouch']?.toLowerCase().includes('đã retouch')).map(i => i['Lô mượn']).filter(Boolean))];

                return { 
                    total, borrowed, expected, unborrowed, 
                    shot, unshot, retouched, unretouched,
                    unshotBatches, unretouchedBatches
                };
            }, [filteredDbData]);

            const getPercent = (part, total) => total === 0 ? 0 : Math.round((part / total) * 100);

            // ================= RENDER NAV =================
            const renderNav = () => (
                <nav className="bg-white shadow-sm border-b px-6 py-3 flex space-x-6 overflow-x-auto">
                    {[
                        { id: 'overview', icon: 'fa-chart-pie', label: 'Tổng quan' },
                        { id: 'borrow', icon: 'fa-box', label: 'Mượn hàng' },
                        { id: 'video', icon: 'fa-film', label: 'Sản xuất Video' },
                        { id: 'database', icon: 'fa-database', label: 'Database Sản Phẩm' },
                    ].map(tab => (
                        <button
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`flex items-center px-4 py-2 rounded-md font-medium transition-colors whitespace-nowrap ${
                                activeTab === tab.id ? 'bg-blue-50 text-blue-700 border border-blue-200' : 'text-gray-600 hover:bg-gray-50'
                            }`}
                        >
                            <i className={`fas ${tab.icon} mr-2`}></i>
                            {tab.label}
                        </button>
                    ))}
                </nav>
            );

            // ================= RENDER TAB VIDEO =================
            const renderVideoTab = () => {
                const handleAddVideo = () => {
                    if(newVideoRecord.month && newVideoRecord.shot) {
                        setVideoData([...videoData, { id: Date.now(), month: newVideoRecord.month, shot: Number(newVideoRecord.shot) }]);
                        setNewVideoRecord({ month: '', shot: '' });
                    }
                };

                const handleDeleteVideo = (id) => {
                    setVideoData(videoData.filter(v => v.id !== id));
                };

                return (
                    <div className="p-6 space-y-6">
                        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">KPI Sản Xuất Video</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                                <span className="text-gray-500 text-sm font-semibold uppercase tracking-wider">KPI Năm</span>
                                <span className="text-4xl font-bold text-blue-600 mt-2">{kpiNăm}</span>
                                <span className="text-sm text-gray-400 mt-1">SKU / năm</span>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                                <span className="text-gray-500 text-sm font-semibold uppercase tracking-wider">KPI Quý</span>
                                <span className="text-4xl font-bold text-purple-600 mt-2">{kpiQuý}</span>
                                <span className="text-sm text-gray-400 mt-1">SKU / quý</span>
                            </div>
                            <div className="bg-gradient-to-br from-green-500 to-green-600 p-6 rounded-xl shadow-sm text-white flex flex-col items-center justify-center">
                                <span className="text-green-100 text-sm font-semibold uppercase tracking-wider">Đã Quay Thực Tế</span>
                                <span className="text-4xl font-bold mt-2">{totalVideoShot}</span>
                                <span className="text-sm text-green-100 mt-1">SKU (Đạt {getPercent(totalVideoShot, kpiNăm)}% Năm)</span>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Theo dõi chi tiết tiến độ</h3>
                            
                            <div className="flex flex-wrap gap-4 mb-6">
                                <input 
                                    type="text" placeholder="Tháng (VD: Tháng 3)" 
                                    className="border border-gray-300 p-2.5 rounded-lg w-full md:w-48 outline-none focus:ring-2 focus:ring-blue-200"
                                    value={newVideoRecord.month}
                                    onChange={(e) => setNewVideoRecord({...newVideoRecord, month: e.target.value})}
                                />
                                <input 
                                    type="number" placeholder="Số lượng SKU đã quay" 
                                    className="border border-gray-300 p-2.5 rounded-lg w-full md:w-48 outline-none focus:ring-2 focus:ring-blue-200"
                                    value={newVideoRecord.shot}
                                    onChange={(e) => setNewVideoRecord({...newVideoRecord, shot: e.target.value})}
                                />
                                <button onClick={handleAddVideo} className="bg-blue-600 text-white px-5 py-2.5 rounded-lg flex items-center hover:bg-blue-700 transition">
                                    <i className="fas fa-plus mr-2"></i> Thêm bản ghi
                                </button>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50 border-b border-gray-200">
                                            <th className="p-3 font-semibold text-gray-600">Thời gian</th>
                                            <th className="p-3 font-semibold text-gray-600">Số SKU Đã Quay</th>
                                            <th className="p-3 font-semibold text-gray-600 w-24 text-center">Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {videoData.map((row) => (
                                            <tr key={row.id} className="border-b border-gray-100 hover:bg-gray-50">
                                                <td className="p-3">{row.month}</td>
                                                <td className="p-3 font-medium text-green-600">+{row.shot} SKU</td>
                                                <td className="p-3 text-center">
                                                    <button onClick={() => handleDeleteVideo(row.id)} className="text-red-500 hover:text-red-700 p-2 rounded hover:bg-red-50 transition">
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            // ================= RENDER TAB DATABASE =================
            const renderDatabaseTab = () => {
                const monthList = [...new Set(dbData.map(item => item['Tháng'] || 'N/A'))].filter(m => m !== 'N/A' && m !== '');
                const locList = [...new Set(dbData.map(item => item['Nơi mượn'] || 'N/A'))].filter(l => l !== 'N/A' && l !== '');

                const toggleFilter = (list, setList, value) => {
                    if (list.includes(value)) {
                        setList(list.filter(item => item !== value));
                    } else {
                        setList([...list, value]);
                    }
                };

                return (
                    <div className="p-6 space-y-6">
                        {/* KHU VỰC TÌM KIẾM VÀ BỘ LỌC */}
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                            <div className="flex flex-col xl:flex-row gap-4 items-center justify-between">
                                {/* Search */}
                                <div className="relative flex-1 w-full">
                                    <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                    <input
                                        type="text"
                                        placeholder="Tìm kiếm SKU, Lô mượn, Phân loại..."
                                        className="w-full pl-11 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>

                                {/* Các Nút Lọc và Action */}
                                <div className="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                                    {/* Dropdown Tháng */}
                                    <div className="relative">
                                        <button 
                                            onClick={() => {setIsMonthDropdownOpen(!isMonthDropdownOpen); setIsLocDropdownOpen(false);}}
                                            className="px-4 py-2.5 border border-gray-300 rounded-lg flex items-center bg-gray-50 hover:bg-gray-100 min-w-[140px] justify-between transition"
                                        >
                                            <span className="text-gray-700 text-sm font-medium">Tháng ({selectedMonths.length || 'Tất cả'})</span>
                                            <i className="fas fa-chevron-down ml-3 text-gray-400 text-xs"></i>
                                        </button>
                                        {isMonthDropdownOpen && (
                                            <div className="absolute z-20 top-full mt-2 left-0 w-48 bg-white border border-gray-200 rounded-lg shadow-xl py-2">
                                                {monthList.length === 0 && <div className="px-4 py-2 text-sm text-gray-500">Chưa có dữ liệu</div>}
                                                {monthList.map(m => (
                                                    <label key={m} className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer text-sm">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={selectedMonths.includes(m)}
                                                            onChange={() => toggleFilter(selectedMonths, setSelectedMonths, m)}
                                                            className="mr-3 cursor-pointer w-4 h-4 text-blue-600 rounded"
                                                        />
                                                        {m}
                                                    </label>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Dropdown Nơi mượn */}
                                    <div className="relative">
                                        <button 
                                            onClick={() => {setIsLocDropdownOpen(!isLocDropdownOpen); setIsMonthDropdownOpen(false);}}
                                            className="px-4 py-2.5 border border-gray-300 rounded-lg flex items-center bg-gray-50 hover:bg-gray-100 min-w-[160px] justify-between transition"
                                        >
                                            <span className="text-gray-700 text-sm font-medium">Nơi mượn ({selectedLocations.length || 'Tất cả'})</span>
                                            <i className="fas fa-chevron-down ml-3 text-gray-400 text-xs"></i>
                                        </button>
                                        {isLocDropdownOpen && (
                                            <div className="absolute z-20 top-full mt-2 left-0 w-48 bg-white border border-gray-200 rounded-lg shadow-xl py-2">
                                                {locList.length === 0 && <div className="px-4 py-2 text-sm text-gray-500">Chưa có dữ liệu</div>}
                                                {locList.map(loc => (
                                                    <label key={loc} className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer text-sm">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={selectedLocations.includes(loc)}
                                                            onChange={() => toggleFilter(selectedLocations, setSelectedLocations, loc)}
                                                            className="mr-3 cursor-pointer w-4 h-4 text-blue-600 rounded"
                                                        />
                                                        {loc}
                                                    </label>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Nút Action */}
                                    <label className="cursor-pointer bg-blue-700 hover:bg-blue-800 text-white px-5 py-2.5 rounded-lg flex items-center shadow-sm transition text-sm font-medium">
                                        <i className="fas fa-upload mr-2"></i> Import CSV
                                        <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                    <button className="border border-gray-300 bg-white hover:bg-gray-50 px-5 py-2.5 rounded-lg flex items-center text-gray-700 shadow-sm transition text-sm font-medium">
                                        <i className="fas fa-download mr-2"></i> Xuất Excel
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* BẢNG THỐNG KÊ SUMMARY */}
                        {dbData.length > 0 && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* Khâu Mượn Hàng */}
                                <div className="bg-white p-5 rounded-xl border border-blue-100 shadow-sm">
                                    <div className="flex items-center text-blue-800 font-bold mb-4">
                                        <i className="fas fa-box text-lg mr-2"></i> KHÂU MƯỢN HÀNG
                                        <span className="ml-auto text-xs bg-blue-100 px-2 py-1 rounded-full text-blue-700">Tổng: {stats.total} SKU</span>
                                    </div>
                                    <div className="space-y-3 text-sm">
                                        <div>
                                            <div className="flex justify-between text-gray-800 font-medium mb-1">
                                                <span>Đã mượn về</span>
                                                <span>{stats.borrowed} ({getPercent(stats.borrowed, stats.total)}%)</span>
                                            </div>
                                            <div className="w-full bg-gray-100 rounded-full h-2"><div className="bg-blue-600 h-2 rounded-full" style={{width: `${getPercent(stats.borrowed, stats.total)}%`}}></div></div>
                                        </div>
                                        <div className="flex justify-between text-gray-600">
                                            <span>Dự kiến mượn:</span> <span className="font-medium">{stats.expected} ({getPercent(stats.expected, stats.total)}%)</span>
                                        </div>
                                        <div className="flex justify-between text-gray-600 border-t pt-2">
                                            <span>Chưa mượn:</span> <span className="font-medium text-orange-500">{stats.unborrowed} ({getPercent(stats.unborrowed, stats.total)}%)</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Khâu Chụp Hình */}
                                <div className="bg-white p-5 rounded-xl border border-orange-100 shadow-sm">
                                    <div className="flex items-center text-orange-800 font-bold mb-4">
                                        <i className="fas fa-camera text-lg mr-2"></i> KHÂU CHỤP HÌNH
                                        <span className="ml-auto text-xs bg-orange-100 px-2 py-1 rounded-full text-orange-800">Từ {stats.borrowed} SKU đã mượn</span>
                                    </div>
                                    <div className="space-y-3 text-sm">
                                        <div>
                                            <div className="flex justify-between text-gray-800 font-medium mb-1">
                                                <span>Đã chụp</span>
                                                <span>{stats.shot} ({getPercent(stats.shot, stats.borrowed)}%)</span>
                                            </div>
                                            <div className="w-full bg-gray-100 rounded-full h-2"><div className="bg-orange-500 h-2 rounded-full" style={{width: `${getPercent(stats.shot, stats.borrowed)}%`}}></div></div>
                                        </div>
                                        <div className="pt-2">
                                            <div className="flex justify-between text-gray-600 items-center">
                                                <span>Chưa chụp:</span> 
                                                <div className="flex items-center">
                                                    <span className="font-bold text-red-500 mr-3">{stats.unshot} ({getPercent(stats.unshot, stats.borrowed)}%)</span>
                                                    <button onClick={() => setShowUnshotDetails(!showUnshotDetails)} className="text-blue-600 hover:text-blue-800 text-xs flex items-center transition">
                                                        Chi tiết <i className={`fas fa-chevron-${showUnshotDetails ? 'up' : 'down'} ml-1`}></i>
                                                    </button>
                                                </div>
                                            </div>
                                            {showUnshotDetails && stats.unshotBatches.length > 0 && (
                                                <div className="mt-2 p-2 bg-red-50 rounded text-xs text-red-700 max-h-24 overflow-y-auto border border-red-100">
                                                    <strong>Các lô chưa chụp xong:</strong> {stats.unshotBatches.join(', ')}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Khâu Retouch */}
                                <div className="bg-white p-5 rounded-xl border border-emerald-100 shadow-sm">
                                    <div className="flex items-center text-emerald-800 font-bold mb-4">
                                        <i className="fas fa-pen text-lg mr-2"></i> KHÂU RETOUCH
                                        <span className="ml-auto text-xs bg-emerald-100 px-2 py-1 rounded-full text-emerald-800">Từ {stats.borrowed} SKU đã mượn</span>
                                    </div>
                                    <div className="space-y-3 text-sm">
                                        <div>
                                            <div className="flex justify-between text-gray-800 font-medium mb-1">
                                                <span>Đã Retouch</span>
                                                <span>{stats.retouched} ({getPercent(stats.retouched, stats.borrowed)}%)</span>
                                            </div>
                                            <div className="w-full bg-gray-100 rounded-full h-2"><div className="bg-emerald-500 h-2 rounded-full" style={{width: `${getPercent(stats.retouched, stats.borrowed)}%`}}></div></div>
                                        </div>
                                        <div className="pt-2">
                                            <div className="flex justify-between text-gray-600 items-center">
                                                <span>Chưa Retouch:</span> 
                                                <div className="flex items-center">
                                                    <span className="font-bold text-red-500 mr-3">{stats.unretouched} ({getPercent(stats.unretouched, stats.borrowed)}%)</span>
                                                    <button onClick={() => setShowUnretouchedDetails(!showUnretouchedDetails)} className="text-blue-600 hover:text-blue-800 text-xs flex items-center transition">
                                                        Chi tiết <i className={`fas fa-chevron-${showUnretouchedDetails ? 'up' : 'down'} ml-1`}></i>
                                                    </button>
                                                </div>
                                            </div>
                                            {showUnretouchedDetails && stats.unretouchedBatches.length > 0 && (
                                                <div className="mt-2 p-2 bg-red-50 rounded text-xs text-red-700 max-h-24 overflow-y-auto border border-red-100">
                                                    <strong>Các lô chưa retouch xong:</strong> {stats.unretouchedBatches.join(', ')}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* BẢNG DỮ LIỆU CHI TIẾT */}
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left whitespace-nowrap">
                                    <thead className="bg-gray-50 text-gray-600 font-medium border-b border-gray-200">
                                        <tr>
                                            <th className="p-4">STT</th>
                                            <th className="p-4">Mã SKU 17</th>
                                            <th className="p-4">Lô mượn</th>
                                            <th className="p-4">Nơi mượn</th>
                                            <th className="p-4">Trạng thái mượn</th>
                                            <th className="p-4">Tháng</th>
                                            <th className="p-4">Phân loại</th>
                                            <th className="p-4">Trạng thái chụp</th>
                                            <th className="p-4">Trạng thái Retouch</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {filteredDbData.slice(0, 100).map((row, idx) => (
                                            <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                <td className="p-4 text-gray-500">{row['STT']}</td>
                                                <td className="p-4 font-bold text-gray-800">{row['Mã SKU 17']}</td>
                                                <td className="p-4">{row['Lô mượn']}</td>
                                                <td className="p-4">
                                                    <span className="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-medium">{row['Nơi mượn'] || '-'}</span>
                                                </td>
                                                <td className="p-4">
                                                    <span className={`px-2.5 py-1 rounded-full text-xs font-medium ${
                                                        row['Tình trạng mượn']?.toLowerCase() === 'done mượn' ? 'bg-green-100 text-green-800' :
                                                        row['Tình trạng mượn']?.toLowerCase() === 'dự kiến mượn' ? 'bg-blue-100 text-blue-800' :
                                                        'bg-gray-100 text-gray-600'
                                                    }`}>
                                                        {row['Tình trạng mượn'] || 'Chưa mượn'}
                                                    </span>
                                                </td>
                                                <td className="p-4">{row['Tháng']}</td>
                                                <td className="p-4 text-gray-600 max-w-[200px] truncate" title={row['Phân loại']}>{row['Phân loại']}</td>
                                                <td className="p-4">
                                                    <span className={row['Tình trạng chụp']?.toLowerCase().includes('đã') ? 'text-orange-600 font-bold' : 'text-gray-400'}>
                                                        {row['Tình trạng chụp']}
                                                    </span>
                                                </td>
                                                <td className="p-4">
                                                    <span className={row['Tình trạng retouch']?.toLowerCase().includes('đã') ? 'text-emerald-600 font-bold' : 'text-gray-400'}>
                                                        {row['Tình trạng retouch']}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {filteredDbData.length === 0 && (
                                    <div className="p-10 text-center text-gray-500">
                                        {dbData.length === 0 ? "Chưa có dữ liệu. Vui lòng Import file CSV." : "Không tìm thấy dữ liệu phù hợp với bộ lọc."}
                                    </div>
                                )}
                                {filteredDbData.length > 100 && (
                                    <div className="p-4 text-center text-sm text-gray-500 bg-gray-50 border-t">
                                        Đang hiển thị 100 dòng đầu tiên trên tổng số {filteredDbData.length} kết quả.
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {/* HEADER GẮN LOGO PNJ */}
                    <header className="bg-gradient-to-r from-red-700 to-red-600 text-white shadow-md">
                        <div className="flex items-center justify-between px-6 py-4">
                            <div className="flex items-center space-x-3">
                                <div className="bg-white/20 p-2 rounded-lg">
                                    <i className="fas fa-columns text-xl"></i>
                                </div>
                                <h1 className="text-xl font-bold tracking-wide">HỆ THỐNG QUẢN LÝ SẢN PHẨM</h1>
                            </div>
                            
                            {/* Logo PNJ Trắng */}
                            <div className="flex items-center">
                                <img 
                                    src="https://cdn.pnj.io/images/logo/pnj.com.vn.png" 
                                    alt="PNJ Logo" 
                                    className="h-8 object-contain filter brightness-0 invert" 
                                />
                            </div>
                        </div>
                    </header>

                    {renderNav()}

                    <main className="flex-1 max-w-[1600px] w-full mx-auto">
                        {activeTab === 'overview' && (
                            <div className="p-10 text-center text-gray-500 mt-10">
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">Trang Tổng Quan</h2>
                                <p>Vui lòng chọn tab "Database Sản Phẩm" để import file và xem dữ liệu.</p>
                            </div>
                        )}
                        {activeTab === 'borrow' && (
                            <div className="p-10 text-center text-gray-500 mt-10">Giao diện quản lý mượn hàng đang được nâng cấp...</div>
                        )}
                        {activeTab === 'video' && renderVideoTab()}
                        {activeTab === 'database' && renderDatabaseTab()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
